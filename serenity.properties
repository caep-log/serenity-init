# Driver Configuration
webdriver.driver=chrome
webdriver.base.url=https://www.amazon.com/
webdriver.autodownload=false

# Chrome Driver Path for Windows
webdriver.chrome.driver=src/test/resources/driver/chromedriver.exe

# Chrome Options
chrome.switches=--start-maximized;--incognito;--no-sandbox;--disable-dev-shm-usage;--remote-allow-origins=*

# Headless Mode
headless.mode=false

# Screenshots
serenity.take.screenshots=FOR_EACH_ACTION